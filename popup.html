<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Git helper</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background-color: #343f50;
      border: 4px solid #96a0b3;
      margin: unset;
      padding: 10px;
      transition-duration: 0.4s;
      width: 325px;
      font: 13px/1.45 system-ui, sans-serif;
    }

    .popup-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid #414f62;
    }

    .popup-brand-icon {
      display: block;
      flex-shrink: 0;
      width: 44px;
      height: 44px;
    }

    .popup-app-title {
      margin: 0;
      color: white;
      font-size: 18px;
      font-weight: 600;
    }

    .title-box {
      margin-bottom: 20px;
    }

    h1 {
      color: white;
      margin: 5px 0 5px 5px;
      font-size: 16px;
      font-weight: 600;
    }

    h3 {
      margin: 5px 0 0 0;
      color: white;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      padding-left: 0;
    }

    .shorten-input {
      width: 200px;
      height: 20px;
      margin-left: 16px;
    }

    .doc-item a {
      color: inherit;
    }

    li.doc-item {
      text-align: initial;
    }

    .button,
    .doc-item {
      background-color: #343f50;
      border: 2px solid #343f50;
      color: #96a0b3;
      padding: 15px 32px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 16px;
      transition-duration: 0.4s;
      cursor: pointer;
    }

    .button.button-small,
    .doc-item {
      padding: 5px 15px;
      font-size: 12px;
    }

    .button.toggle-switch {
      border: 2px solid #414f62;
    }

    .button.toggle-switch.left {
      border-radius: 50px 0 0 50px;
    }

    .button.toggle-switch.right {
      border-radius: 0 50px 50px 0;
    }

    .button:hover,
    .button.active,
    .doc-item:hover {
      background-color: #414f62;
      color: white;
    }

    .button:focus,
    .doc-item,
    input {
      outline: none;
    }

    .flex-row {
      display: flex;
    }

    .flex-row.flex-row-spaced {
      justify-content: space-between;
    }

    .flex-col {
      display: flex;
      flex-direction: column;
    }

    .margin-btm {
      margin-bottom: 20px;
    }

    .meta {
      margin: 5px 0 0 5px;
      color: #96a0b3;
      font-size: 12px;
    }

    .body {
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 280px;
      overflow-y: auto;
      padding: 15px;
      background-color: #414f62;
      color: #96a0b3;
      border: 2px solid #414f62;
      transition-duration: 0.4s;
    }

    .body.err {
      color: #f08888;
    }

    .token-row {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 2px solid #414f62;
    }

    .token-row label,
    .notes-head label {
      display: block;
      font-size: 11px;
      color: #96a0b3;
      margin-bottom: 4px;
    }

    .token-row input {
      width: 100%;
      padding: 8px 10px;
      font-size: 12px;
      background-color: #414f62;
      border: 2px solid #414f62;
      color: white;
      transition-duration: 0.4s;
    }

    .token-row input::placeholder {
      color: #96a0b3;
    }

    .token-row input:focus {
      border-color: #96a0b3;
    }

    .token-row .button {
      margin-top: 8px;
    }

    .notes-row {
      margin-top: 12px;
    }

    .notes-head {
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .notes-head label {
      margin-bottom: 0;
    }

    .notes-actions {
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }

    .notes-post-feedback {
      margin: 4px 0 0 0;
      min-height: 1em;
      font-size: 11px;
      color: #96a0b3;
    }

    .notes-post-feedback.err {
      color: #f08888;
    }

    #notes {
      width: 100%;
      min-height: 88px;
      max-height: 160px;
      padding: 8px;
      font: 12px/1.4 ui-monospace, monospace;
      background-color: #414f62;
      border: 2px solid #414f62;
      color: white;
      resize: vertical;
      transition-duration: 0.4s;
    }

    #notes::placeholder {
      color: #96a0b3;
    }

    #notes:focus {
      border-color: #96a0b3;
      outline: none;
    }

    #notes:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <header class="popup-header">
    <img class="popup-brand-icon" src="icon-48.png" width="44" height="44" alt="" />
    <h2 class="popup-app-title">git helper</h2>
  </header>
  <div class="title-box">
    <h1 id="title"></h1>
    <div class="meta" id="meta"></div>
  </div>
  <div id="content" class="body"></div>
  <div class="notes-row">
    <div class="notes-head flex-row flex-row-spaced">
      <label for="notes">Notes</label>
      <div class="notes-actions flex-row">
        <button type="button" id="copyNotes" class="button button-small">Copy</button>
        <button type="button" id="postNotes" class="button button-small" disabled>Post</button>
      </div>
    </div>
    <p id="notesPostFeedback" class="notes-post-feedback"></p>
    <textarea id="notes" spellcheck="true"></textarea>
  </div>
  <div class="token-row" id="myPrsRow">
    <label for="myPrsUsername">My PRs — GitHub username</label>
    <input id="myPrsUsername" type="text" autocomplete="username" spellcheck="false" placeholder="e.g. roth-j" />
    <button type="button" id="saveMyPrsUsername" class="button button-small margin-btm">Save username</button>
  </div>
  <div class="token-row" id="tokenSection">
    <label for="token">GitHub token (stored locally in this browser)</label>
    <input id="token" type="password" autocomplete="off" placeholder="ghp_… or gho_…" />
    <button type="button" id="saveToken" class="button button-small">Save token</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
